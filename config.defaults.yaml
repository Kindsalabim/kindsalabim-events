# Nicht-geheime Standard-Konfiguration (committet, im Repo).
# Secrets (secret_key, admin_password_hash, cron_secret, resend_api_key, …)
# kommen NICHT hierher, sondern aus Environment-Variablen (Render) bzw. der
# lokalen, gitignorierten config.yaml. Reihenfolge: defaults -> config.yaml -> ENV.

app_name: "Kindsalabim Events"
company_name: "Kindsalabim Kinderevents"
company_address: "Charlottenweg 55, 45289 Essen"
company_email: "info@kindsalabim.de"
company_phone: "0177/7442137"
primary_color: "#166534"
admin_email: "a.malca@kindsalabim.de"

# Absenderadresse für Resend (verifizierte Domain kindsalabim-events.de)
mail_from: "noreply@kindsalabim-events.de"

smtp_port: 465

# Google-Kalender-Sync (App → Kalender). Das Service-Account-JSON kommt als
# Secret über die ENV-Variable GOOGLE_CALENDAR_CREDENTIALS (nicht hierher!).
# Diese beiden IDs sind nicht geheim und steuern, in welchen Kalender geschrieben wird.
calendar_id_kindsalabim: "kindsalabim@gmail.com"
calendar_id_knallfrosch: "info@knallfrosch-kinderevents.de"

# Baker-Ross-Recherche: Standard-Aufschlag (Kundenpreis = BR-Preis × Faktor).
# Der API-Key (anthropic_api_key) kommt als Secret über ENV ANTHROPIC_API_KEY.
bakerross_markup_default: 2.5
bakerross_model: "claude-haiku-4-5-20251001"
