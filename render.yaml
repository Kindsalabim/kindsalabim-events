services:
  - type: web
    name: kindsalabim-events
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false

  - type: cron
    name: erinnerungs-email
    runtime: python
    schedule: "0 8 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python cron_runner.py
    envVars:
      - key: CRON_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
