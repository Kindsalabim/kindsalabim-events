<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ cfg.app_name }}{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Nunito', system-ui, sans-serif; color: #1f2937; background: #f5f7fb; }
    h1, h2, h3, h4, .font-display { font-family: 'Poppins', 'Nunito', system-ui, sans-serif; letter-spacing: -0.01em; }

    :root {
      --brand-primary: #003864;
      --brand-primary-dark: #002a4d;
      --brand-primary-light: #e8f0f7;
      --brand-accent: #ef3845;
      --brand-accent-light: #fef2f2;

      /* Weiche Flächen & Akzente (freundlicher Look) */
      --surface: #f5f7fb;
      --line: #eceff4;
      --r-card: 1rem;
      --r-lg: 1.25rem;
      --shadow-sm: 0 1px 2px rgba(16,24,40,0.04), 0 1px 3px rgba(16,24,40,0.05);
      --shadow-md: 0 6px 22px rgba(16,24,40,0.09);
      --c-sky-bg: #eaf2fb;   --c-sky: #1d4e89;
      --c-amber-bg: #fff4d6; --c-amber: #b07d1a;
      --c-green-bg: #e6f6ec; --c-green: #1f7a44;
      --c-coral-bg: #ffece9; --c-coral: #c0473f;
    }

    .brand-knallfrosch {
      --brand-primary: #1a7a1a;
      --brand-primary-dark: #145c14;
      --brand-primary-light: #f0faf0;
      --brand-accent: #e8131b;
      --brand-accent-light: #fff0f0;
    }

    /* Buttons */
    .btn-primary {
      background-color: var(--brand-primary);
      color: white;
      padding: 0.62rem 1.4rem;
      border-radius: 0.7rem;
      font-size: 0.875rem;
      font-weight: 600;
      transition: background-color 0.15s, box-shadow 0.15s, transform 0.1s;
      box-shadow: 0 2px 8px rgba(0,56,100,0.18);
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      cursor: pointer;
      border: none;
      text-decoration: none;
    }
    .btn-primary:hover { background-color: var(--brand-primary-dark); box-shadow: 0 4px 14px rgba(0,56,100,0.24); }
    .btn-primary:active { transform: translateY(1px); }

    .btn-secondary {
      background-color: white;
      color: #374151;
      padding: 0.62rem 1.4rem;
      border-radius: 0.7rem;
      font-size: 0.875rem;
      font-weight: 600;
      border: 1px solid var(--line);
      transition: border-color 0.15s, background-color 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      cursor: pointer;
      text-decoration: none;
    }
    .btn-secondary:hover { background-color: #f9fafb; border-color: #d8dde6; }

    /* Status badges – neue Bezeichnungen */
    .badge-status-entwurf        { background: #e8f0f7; color: #003864; }   /* Event eingepflegt */
    .badge-status-bestaetigt     { background: #dcfce7; color: #166534; }   /* Bestätigt          */
    .badge-status-briefing       { background: #dbeafe; color: #1e40af; }   /* Briefing gesendet  */
    .badge-status-abgeschlossen  { background: #f3f4f6; color: #6b7280; }   /* Abgeschlossen      */
    .badge-status-angefragt      { background: #fef9c3; color: #854d0e; }   /* DL angefragt       */
    .badge-status-checkliste-out { background: #ede9fe; color: #5b21b6; }   /* Checkliste geschickt */
    .badge-status-checkliste-in  { background: #d1fae5; color: #065f46; }   /* Checkliste eingegangen */
    .badge-status-planung-fertig { background: #dcfce7; color: #14532d; }   /* Planung fertig     */

    /* Status left-bar colors for event cards */
    .status-bar-entwurf          { background: #93c5fd; }
    .status-bar-bestaetigt       { background: #16a34a; }
    .status-bar-briefing         { background: #2563eb; }
    .status-bar-abgeschlossen    { background: #9ca3af; }
    .status-bar-angefragt        { background: #f59e0b; }
    .status-bar-planung-fertig   { background: #14532d; }

    /* Sidebar */
    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      padding: 0.5rem 0.75rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      color: rgba(255,255,255,0.75);
      transition: background-color 0.15s, color 0.15s;
      text-decoration: none;
    }
    .sidebar-link:hover { background-color: rgba(255,255,255,0.1); color: white; }
    .sidebar-link.active  { background-color: rgba(255,255,255,0.18); color: white; font-weight: 500; }

    /* Cards */
    .card {
      background: white;
      border-radius: var(--r-card);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-sm);
    }

    .event-card {
      background: white;
      border-radius: var(--r-lg);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-sm);
      display: flex;
      overflow: hidden;
      transition: box-shadow 0.2s, transform 0.2s;
      text-decoration: none;
      color: inherit;
    }
    .event-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }
    .event-card-bar { width: 6px; flex-shrink: 0; }
    .event-card-body { flex: 1; padding: 1.1rem 1.25rem; min-width: 0; }

    /* Datums-Badge (Tag + Monat) */
    .date-badge {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      width: 3.4rem; height: 3.4rem; flex-shrink: 0;
      border-radius: 0.9rem;
      background: var(--brand-primary-light);
      color: var(--brand-primary);
      line-height: 1;
    }
    .date-badge .d { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 1.25rem; }
    .date-badge .m { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 0.18rem; }

    /* Info-Pill für Event-Detail */
    .info-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #f8f9fb;
      border: 1px solid #eef0f3;
      border-radius: 0.5rem;
      padding: 0.45rem 0.75rem;
      font-size: 0.8rem;
      color: #374151;
    }
    .info-pill svg { color: #9ca3af; flex-shrink: 0; }

    /* Stats chips */
    .stat-chip {
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--r-card);
      padding: 0.95rem 1.2rem;
      box-shadow: var(--shadow-sm);
    }
    .stat-chip.sky   { background: var(--c-sky-bg);   border-color: transparent; }
    .stat-chip.amber { background: var(--c-amber-bg); border-color: transparent; }
    .stat-chip.green { background: var(--c-green-bg); border-color: transparent; }
    .stat-chip.coral { background: var(--c-coral-bg); border-color: transparent; }

    /* Monatskalender */
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.2rem; }
    .cal-dow { text-align: center; font-size: 0.66rem; font-weight: 700; color: #9aa3b2; padding-bottom: 0.3rem; text-transform: uppercase; }
    .cal-cell {
      min-height: 2.55rem; display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      padding-top: 0.28rem; font-size: 0.82rem; color: #374151; border-radius: 0.55rem;
      text-decoration: none; border: 1px solid transparent; transition: background 0.12s, border-color 0.12s;
    }
    a.cal-cell:hover { background: #f1f4f9; }
    .cal-cell.muted { color: #cdd4de; pointer-events: none; }
    .cal-cell .num { text-align: center; min-width: 1.5rem; }
    .cal-cell.today { font-weight: 800; }
    .cal-cell.today .num { display: inline-block; height: 1.5rem; line-height: 1.5rem; border-radius: 9999px; background: var(--brand-primary); color: #fff; }
    .cal-cell.selected { border-color: var(--brand-primary); background: var(--brand-primary-light); }
    .cal-dots { display: flex; gap: 2px; margin-top: 3px; align-items: center; height: 7px; }
    .cd { width: 6px; height: 6px; border-radius: 9999px; display: inline-block; }
    .cd.ks { background: #1d4e89; }   /* Kindsalabim – blau */
    .cd.kf { background: #1a7a1a; }   /* Knallfrosch – grün */
    .cal-more { font-size: 0.56rem; color: #8b94a3; font-weight: 700; margin-left: 1px; }
    .cal-nav {
      width: 1.9rem; height: 1.9rem; display: inline-flex; align-items: center; justify-content: center;
      border-radius: 0.55rem; color: var(--brand-primary); text-decoration: none; font-size: 1.15rem;
      border: 1px solid var(--line); background: #fff; line-height: 1;
    }
    .cal-nav:hover { background: #f1f4f9; }

    /* Brand tags */
    .brand-tag-kindsalabim {
      background: #e8f0f7;
      color: #003864;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 0.15rem 0.5rem;
      border-radius: 9999px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .brand-tag-knallfrosch {
      background: #f0faf0;
      color: #1a7a1a;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 0.15rem 0.5rem;
      border-radius: 9999px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .focus-ring:focus {
      outline: none;
      box-shadow: 0 0 0 2px var(--brand-primary-light), 0 0 0 4px var(--brand-primary);
    }

    /* Mobile sidebar overlay */
    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 40;
    }
    #sidebar-overlay.open { display: block; }

    #sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 220px;
      z-index: 50;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      display: flex;
      flex-direction: column;
    }
    #sidebar.open { transform: translateX(0); }

    @media (min-width: 768px) {
      #sidebar {
        position: sticky;
        top: 0;
        height: 100vh;
        transform: translateX(0) !important;
        flex-shrink: 0;
      }
      #sidebar-overlay { display: none !important; }
      #hamburger { display: none !important; }
      #mobile-topbar { display: none !important; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="min-h-screen">
{% block body %}{% endblock %}
</body>
</html>
