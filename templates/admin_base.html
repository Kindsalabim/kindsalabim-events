{% extends "base.html" %}
{% block body %}
<div class="flex min-h-screen">
  <!-- Sidebar -->
  <aside class="w-56 bg-green-800 text-white flex flex-col">
    <div class="px-5 py-5 border-b border-green-700">
      <div class="font-bold text-lg leading-tight">{{ cfg.app_name }}</div>
      <div class="text-green-300 text-xs mt-1">Admin</div>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1">
      <a href="/admin/dashboard" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-green-700 text-sm {% if active=='dashboard' %}bg-green-700{% endif %}">
        📅 Dashboard
      </a>
      <a href="/admin/events/new" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-green-700 text-sm {% if active=='new_event' %}bg-green-700{% endif %}">
        ➕ Neues Event
      </a>
      <a href="/admin/dienstleister" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-green-700 text-sm {% if active=='dienstleister' %}bg-green-700{% endif %}">
        👥 Dienstleister
      </a>
    </nav>
    <div class="px-3 py-4 border-t border-green-700">
      <a href="/admin/logout" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-green-700 text-sm text-green-300">
        🚪 Abmelden
      </a>
    </div>
  </aside>

  <!-- Main content -->
  <main class="flex-1 p-6 overflow-auto">
    {% block content %}{% endblock %}
  </main>
</div>
{% endblock %}
