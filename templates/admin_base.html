{% extends "base.html" %}
{% block body %}

<!-- Mobile top bar -->
<div id="mobile-topbar" class="fixed top-0 left-0 right-0 z-30 flex items-center px-4 h-14 bg-white border-b border-gray-100 shadow-sm md:hidden">
  <button id="hamburger" onclick="openSidebar()" class="p-2 rounded-lg hover:bg-gray-100 transition-colors -ml-1">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <img src="/static/img/logo-kindsalabim.png" alt="KindSalabim"
       onerror="this.style.display='none';this.nextElementSibling.style.display='inline'"
       style="height:28px;width:auto;object-fit:contain;margin-left:0.75rem;">
  <span style="display:none;" class="ml-3 font-semibold text-gray-800 text-sm">{{ cfg.app_name }}</span>
</div>

<!-- Sidebar overlay (mobile) -->
<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<div class="flex min-h-screen">

  <!-- Sidebar -->
  <aside id="sidebar" style="background-color: var(--brand-primary);">

    <!-- Logo -->
    <div class="px-4 py-4" style="border-bottom: 1px solid rgba(255,255,255,0.12);">
      <img src="/static/img/logo-kindsalabim.png" alt="KindSalabim"
           onerror="this.style.display='none';this.nextElementSibling.style.display='block'"
           style="height:36px;width:auto;object-fit:contain;">
      <div style="display:none;">
        <div class="font-bold text-white text-base leading-tight tracking-tight">{{ cfg.app_name }}</div>
      </div>
      <div class="text-xs mt-1" style="color: rgba(255,255,255,0.5);">Admin</div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-3 py-4 space-y-0.5">
      <a href="/admin/dashboard" onclick="closeSidebar()" class="sidebar-link {% if active=='dashboard' %}active{% endif %}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        Dashboard
      </a>
      <a href="/admin/events/new" onclick="closeSidebar()" class="sidebar-link {% if active=='new_event' %}active{% endif %}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Neues Event
      </a>
      <a href="/admin/dienstleister" onclick="closeSidebar()" class="sidebar-link {% if active=='dienstleister' %}active{% endif %}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Dienstleister
      </a>
    </nav>

    <!-- Logout -->
    <div class="px-3 py-4" style="border-top: 1px solid rgba(255,255,255,0.12);">
      <a href="/admin/logout" class="sidebar-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Abmelden
      </a>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 overflow-auto pt-14 md:pt-0">
    <div class="px-4 py-6 md:px-8 md:py-7 max-w-5xl">
      {% block content %}{% endblock %}
    </div>
  </main>
</div>

<script>
  function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebar-overlay').classList.add('open');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
  }
</script>

{% endblock %}
