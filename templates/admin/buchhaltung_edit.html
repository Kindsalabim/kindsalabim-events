{% extends "admin_base.html" %}
{% set active = 'buchhaltung' %}
{% block title %}Rechnung bearbeiten – {{ cfg.app_name }}{% endblock %}
{% block content %}

<div class="flex items-center gap-3 mb-6">
  <a href="/admin/buchhaltung?jahr={{ r.datum.year if r.datum else '' }}"
     class="text-sm font-semibold" style="color:var(--ink-3);">← Zurück</a>
  <h1 class="text-2xl font-bold" style="color:var(--ink-1);">Rechnung bearbeiten</h1>
</div>

<div class="card p-6 max-w-2xl">
  <form method="post" action="/admin/buchhaltung/{{ r.id }}/edit">
    <div class="grid grid-cols-2 gap-4 mb-4">

      <div>
        <label class="block text-sm font-semibold mb-1.5" style="color:var(--ink-2);">Datum *</label>
        <input type="date" name="datum" required
               value="{{ r.datum.strftime('%Y-%m-%d') if r.datum else '' }}"
               class="w-full rounded-xl border border-gray-200 px-3.5 py-2.5 text-sm">
      </div>

      <div>
        <label class="block text-sm font-semibold mb-1.5" style="color:var(--ink-2);">Rechnungs-Nr.</label>
        <input type="text" name="rgnr" value="{{ r.rgnr or '' }}" placeholder="RE-2026-001"
               class="w-full rounded-xl border border-gray-200 px-3.5 py-2.5 text-sm">
      </div>

      <div class="col-span-2">
        <label class="block text-sm font-semibold mb-1.5" style="color:var(--ink-2);">Kunde</label>
        <input type="text" name="kunde" value="{{ r.kunde or '' }}" placeholder="Firmenname"
               class="w-full rounded-xl border border-gray-200 px-3.5 py-2.5 text-sm">
      </div>

      <div>
        <label class="block text-sm font-semibold mb-1.5" style="color:var(--ink-2);">Brutto (€)</label>
        <input type="text" name="brutto" value="{{ '%.2f'|format(r.brutto or 0)|replace('.', ',') }}"
               class="w-full rounded-xl border border-gray-200 px-3.5 py-2.5 text-sm">
      </div>

      <div></div>

      <div>
        <label class="block text-sm font-semibold mb-1.5" style="color:var(--ink-2);">Personalkosten (€)</label>
        <input type="text" name="personalkosten" value="{{ '%.2f'|format(r.personalkosten or 0)|replace('.', ',') }}"
               class="w-full rounded-xl border border-gray-200 px-3.5 py-2.5 text-sm">
      </div>

      <div>
        <label class="block text-sm font-semibold mb-1.5" style="color:var(--ink-2);">Materialkosten (€)</label>
        <input type="text" name="materialkosten" value="{{ '%.2f'|format(r.materialkosten or 0)|replace('.', ',') }}"
               class="w-full rounded-xl border border-gray-200 px-3.5 py-2.5 text-sm">
      </div>

      <div class="col-span-2">
        <label class="block text-sm font-semibold mb-1.5" style="color:var(--ink-2);">Notiz</label>
        <input type="text" name="notiz" value="{{ r.notiz or '' }}"
               class="w-full rounded-xl border border-gray-200 px-3.5 py-2.5 text-sm">
      </div>

    </div>

    <div class="flex gap-3">
      <button type="submit" class="btn-primary">Speichern</button>
      <a href="/admin/buchhaltung?jahr={{ r.datum.year if r.datum else '' }}"
         class="px-4 py-2.5 rounded-xl text-sm font-semibold transition"
         style="background:#f3f4f6;color:var(--ink-2);">Abbrechen</a>
    </div>
  </form>
</div>

{% endblock %}
