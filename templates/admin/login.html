{% extends "base.html" %}
{% block title %}Login – {{ cfg.app_name }}{% endblock %}
{% block body %}
<div class="min-h-screen flex items-center justify-center bg-gray-50">
  <div class="w-full max-w-sm">

    <!-- Logo / Header -->
    <div class="text-center mb-8">
      <img src="/static/img/logo-kindsalabim.png" alt="KindSalabim"
           onerror="this.style.display='none'"
           style="height:56px;width:auto;margin:0 auto 1.25rem;display:block;">
      <p class="text-sm text-gray-500">Admin-Bereich</p>
    </div>

    <!-- Card -->
    <div class="card p-7">
      {% if error %}
      <div class="rounded-lg px-4 py-3 mb-5 text-sm flex items-center gap-2" style="background: var(--brand-accent-light); color: var(--brand-accent);">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/admin/login" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">E-Mail</label>
          <input type="email" name="email" required autocomplete="email"
            class="w-full border border-gray-200 rounded-lg px-3.5 py-2.5 text-sm bg-white focus-ring transition"
            placeholder="deine@email.de">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Passwort</label>
          <input type="password" name="password" required autocomplete="current-password"
            class="w-full border border-gray-200 rounded-lg px-3.5 py-2.5 text-sm bg-white focus-ring transition">
        </div>
        <button type="submit" class="btn-primary w-full justify-center py-2.5 mt-2">
          Anmelden
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
