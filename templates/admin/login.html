{% extends "base.html" %}
{% block body %}
<div class="min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
    <div class="text-center mb-6">
      <div class="text-3xl mb-2">🎪</div>
      <h1 class="text-xl font-bold text-gray-800">{{ cfg.app_name }}</h1>
      <p class="text-gray-500 text-sm mt-1">Admin-Bereich</p>
    </div>
    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-4 text-sm">{{ error }}</div>
    {% endif %}
    <form method="post" action="/admin/login" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">E-Mail</label>
        <input type="email" name="email" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Passwort</label>
        <input type="password" name="password" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500">
      </div>
      <button type="submit" class="w-full bg-green-700 hover:bg-green-800 text-white font-medium py-2 rounded-lg text-sm transition">Anmelden</button>
    </form>
  </div>
</div>
{% endblock %}
