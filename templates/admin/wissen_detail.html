{% extends "admin_base.html" %}
{% set active = 'wissen' %}
{% block title %}{{ a.titel }} – {{ cfg.app_name }}{% endblock %}
{% block content %}

<div class="mb-6">
  <a href="/admin/wissen" class="inline-flex items-center gap-1.5 text-sm text-gray-400 hover:text-gray-600 mb-4 transition-colors">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Wissensdatenbank
  </a>
  <div class="flex items-start justify-between gap-4">
    <div>
      <p class="text-xs font-medium text-gray-400 uppercase tracking-wide mb-1">{{ a.kategorie }}</p>
      <h1 class="text-xl font-bold text-gray-900">{{ a.titel }}</h1>
    </div>
    <a href="/admin/wissen/{{ a.id }}/edit" class="btn-primary shrink-0">Bearbeiten</a>
  </div>
</div>

<div class="card p-7 max-w-3xl">
  <div class="prose-wissen">{{ inhalt_html | safe }}</div>
</div>

<style>
.prose-wissen h1{font-size:1.4rem;font-weight:700;margin:.6em 0 .3em}
.prose-wissen h2{font-size:1.15rem;font-weight:600;margin:.6em 0 .3em}
.prose-wissen h3{font-size:1rem;font-weight:600;margin:.5em 0 .2em}
.prose-wissen p{margin:.5em 0;line-height:1.65;color:#374151}
.prose-wissen ul,.prose-wissen ol{margin:.5em 0;padding-left:1.4em}
.prose-wissen li{margin:.2em 0;color:#374151}
.prose-wissen a{color:var(--brand-primary);text-decoration:underline}
.prose-wissen code{background:#f1f5f9;padding:.1em .3em;border-radius:4px;font-size:.85em}
.prose-wissen table{border-collapse:collapse;margin:.5em 0}
.prose-wissen th,.prose-wissen td{border:1px solid #e5e7eb;padding:.4em .7em}
.prose-wissen img{max-width:100%;border-radius:8px;margin:.5em 0}
</style>
{% endblock %}
